phase: 2
name: Application Shell
slug: 02-application-shell
status: not_started
features:
  - F0-full
depends_on:
  - phase-1
goal: >
  Authenticated users can access the full application shell — navigation, role-filtered views,
  global search, audit trail, and user/role management — from any device with a browser.
success_criteria:
  - An unauthenticated user is redirected to the login page; after login they reach the Dashboard
  - Navigation shows role-filtered sections; direct URL access to a hidden section returns 403
  - Global search returns matching engagements by ID, title, requester, phase, or owner within the user's access scope
  - Admin can create a user, assign roles, and the new permissions take effect on the user's next request
  - Any authorized user can view the audit trail for an engagement, filtered by action type or date range
