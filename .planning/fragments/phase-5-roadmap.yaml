phase: 5
name: Evidence, Findings, and Gate P3
slug: 05-evidence-findings-and-gate-p3
status: not_started
features:
  - F8
  - F9
  - F10
depends_on:
  - phase-4
goal: >
  Analysts can upload and manage evidence, link evidence to objectives, create findings,
  and a QA Reviewer can mark all objectives sufficient and approve Gate P3.
success_criteria:
  - An Analyst can add an evidence record and upload one or more files (≤25 MB each); evidence is listed by engagement
  - A user can link evidence to objectives; system displays linked evidence per objective and highlights gaps; evidence registry exportable to CSV
  - An Analyst can create a finding record and link it to one or more evidence items
  - A QA Reviewer can mark each objective as Evidence Needed / In Review / Sufficient; Gate P3 blocked if any objective has no linked evidence or is marked Evidence Needed
  - When QA approves P3, an immutable GateDecision and AuditEvent are written; engagement advances to draft phase
