depends_on: []
goal: >
  The project runs locally, the database schema exists, all core data objects are seeded,
  and the API boots with authentication working.
success_criteria:
  - docker-compose up starts frontend, backend, database, and file storage without errors
  - All 20 database tables are created by migrations with correct columns, indexes, and constraints
  - A user can log in with username/password and receive a session token; the system locks accounts after 5 failed attempts
  - All ten core data objects are accessible via the database and their fields match the PRD data model
  - The backend API boots, health check passes, and RBAC middleware is active on all routes
