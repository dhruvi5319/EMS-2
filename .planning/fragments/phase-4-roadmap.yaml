depends_on:
  - phase-3
goal: >
  An Engagement Manager can fully set up an accepted engagement — metadata, team, milestones,
  and planning record — and a QA Reviewer can approve the planning baseline, locking it at Gate P2.
success_criteria:
  - An EM can view and edit the Engagement Shell showing job code, title, phase, status, risk level, owner, portfolio, gate status cards (A1/P2/P3/P4), open blockers, and artifact links
  - An EM can assign users to predefined roles and set milestone dates; milestone status (Not Started / On Track / At Risk / Complete) is computed and visible
  - An EM or Analyst can create a planning record with objectives, design approach, risk notes, data reliability notes, and independence affirmation; save as Draft or submit as Ready for Review
  - Gate P2 is blocked if any prerequisite is missing (8 total checks)
  - When QA approves Gate P2, the planning record is locked; edits require revision note; GateDecision and AuditEvent are written
