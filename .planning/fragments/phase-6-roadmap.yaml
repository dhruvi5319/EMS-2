phase: 6
name: Draft Product, Reference Check, Gate P4, and Dashboard
slug: 06-draft-reference-check-gate-p4-and-dashboard
status: not_started
features:
  - F11
  - F12
  - F13
  - F14
depends_on:
  - phase-5
goal: >
  The team can create and track a draft product, an Independent Referencer can check all statements
  against evidence, and the Publishing Coordinator can approve Gate P4, completing the engagement;
  the portfolio dashboard shows all engagements.
success_criteria:
  - An Analyst or EM can create a draft product record and update status through Drafting → Under Review → Ready for Reference Check → Ready for Final Review
  - An Analyst can add draft statement records and link each to evidence items; an IR can mark each statement Not Started / In Review / Passed / Failed and capture discrepancy notes; EM/AD can waive with justification
  - Gate P4 is blocked if any reference check is In Review or Failed; PC can approve P4 setting engagement to Ready for Issuance or Closed with an audit event
  - Any user can view the portfolio dashboard with counts by phase, filters, sortable list, and CSV export
