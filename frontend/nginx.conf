server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Static SPA only. /api is routed to the backend by the Istio
    # VirtualService (see charts/ems-frontend), not by nginx, so there is no
    # upstream dependency here and nginx starts independently of the backend.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
