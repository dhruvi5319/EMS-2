name: Deploy to Daytona Sandbox

on:
  push:
    branches:
      - Stage
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  pull-requests: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Job 1: Build the backend and frontend Docker images on GitHub Actions
  # (full network access) and push them to GitHub Container Registry.
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - service: backend
            context: ./backend
            suffix: backend
          - service: frontend
            context: ./frontend
            suffix: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.suffix }}
          tags: |
            type=sha,prefix=stage-
            type=raw,value=stage-latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # Job 2: Deploy the pre-built images to a Daytona sandbox.
  deploy:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    outputs:
      sandbox_url: ${{ steps.deploy.outputs.sandbox_url }}
      sandbox_id: ${{ steps.deploy.outputs.sandbox_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Daytona SDK
        run: npm install @daytonaio/sdk

      - name: Deploy to Daytona
        id: deploy
        env:
          DAYTONA_API_KEY: ${{ secrets.DAYTONA_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          BACKEND_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:stage-latest
          FRONTEND_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:stage-latest
        run: node .github/scripts/deploy-daytona.mjs

      - name: Summary
        if: always()
        run: |
          if [ -n "${{ steps.deploy.outputs.sandbox_url }}" ]; then
            echo "## 🚀 Daytona Sandbox Deployed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| | |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|" >> $GITHUB_STEP_SUMMARY
            echo "| **URL** | ${{ steps.deploy.outputs.sandbox_url }} |" >> $GITHUB_STEP_SUMMARY
            echo "| **Sandbox ID** | ${{ steps.deploy.outputs.sandbox_id }} |" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Deployment Failed" >> $GITHUB_STEP_SUMMARY
            echo "Check the workflow logs for details." >> $GITHUB_STEP_SUMMARY
          fi
